<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Stress Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; border: 1px solid #334155; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        canvas { max-height: 450px; width: 100% !important; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 2rem; }
        h2 { font-size: 1.1rem; color: #94a3b8; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
    </style>
</head>
<body>
    <h1>Vector DB Stress Test Metrics</h1>
    <div class="grid">
        <div class="card"><h2>Insert Throughput (Total QPS)</h2><canvas id="iChart"></canvas></div>
        <div class="card"><h2>Search Throughput (Total QPS)</h2><canvas id="sChart"></canvas></div>
    </div>
    <script>
        const concs = [1, 10, 50, 100, 500, 1000];
        const js_insert = [{"label": "Hyperspace", "data": [9789.832616265676, 10974.070470194632, 10496.847294955296, 10273.607438003371, 9220.542512875178, 8029.071017288435], "borderColor": "#22d3ee", "tension": 0.1}, {"label": "Qdrant", "data": [1669.999189746773, 1858.9074502704061, 1828.389527025466, 1833.4696387587846, 1815.1240982756576, 1798.0452797637556], "borderColor": "#fac05e", "tension": 0.1}, {"label": "Milvus", "data": [7286.074790983502, 9281.852659830372, 8587.198998928827, 8414.251272177087, 7950.092052512296, 6812.528231205062], "borderColor": "#818cf8", "tension": 0.1}, {"label": "Chroma", "data": [2115.107571193375, 1982.8936055181528, 1826.9028314070358, 1520.4447293873413, 1218.7050282786483, 1011.0334223085928], "borderColor": "#f472b6", "tension": 0.1}, {"label": "Weaviate", "data": [1141.6171715955968, 654.4984039838431, 727.1038227096411, 591.7104134782596, 503.6579439689568, 548.0773451217785], "borderColor": "#10b981", "tension": 0.1}];
        const js_search = [{"label": "Hyperspace", "data": [3559.5219859233403, 5957.97051629161, 5163.246602247708, 5059.2970812842495, 5036.935449877778, 4866.439605816796], "borderColor": "#22d3ee", "tension": 0.1}, {"label": "Qdrant", "data": [585.4358609306764, 3546.3008565378386, 3252.1648512517677, 3366.9122498880183, 3096.4922253704963, 2684.7832661919456], "borderColor": "#fac05e", "tension": 0.1}, {"label": "Milvus", "data": [848.6694670999005, 4664.419144529241, 5141.694662599211, 4913.618429068144, 4838.278924904834, 4160.859015235536], "borderColor": "#818cf8", "tension": 0.1}, {"label": "Chroma", "data": [1118.3975596488795, 430.27999615915223, 419.7828706873727, 396.431955127987, 231.6837548210094, 239.01358708574514], "borderColor": "#f472b6", "tension": 0.1}, {"label": "Weaviate", "data": [146.77204513630633, 810.5365985632087, 1002.1526561631446, 970.2318406131495, 921.2408262847814, 933.4506182215538], "borderColor": "#10b981", "tension": 0.1}];
        
        const commonOptions = { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#f1f5f9', font: { family: 'Inter' } } } },
            scales: { 
                y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, 
                x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } } 
            } 
        };

        new Chart(document.getElementById('iChart'), { 
            type: 'line', 
            data: { labels: concs, datasets: js_insert }, 
            options: commonOptions 
        });
        new Chart(document.getElementById('sChart'), { 
            type: 'line', 
            data: { labels: concs, datasets: js_search }, 
            options: commonOptions 
        });
    </script>
</body>
</html>
